name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Integration + E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      TEST_ENV: prod
      E2E_BASE_URL_PROD: https://www.saucedemo.com
      POKEAPI_BASE_URL: https://pokeapi.co/api/v2
      SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
      SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias (reproducible)
        run: npm ci

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps

      - name: Ejecutar suite de pruebas (integración + E2E)
        run: npx playwright test

      - name: Publicar reporte HTML de Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
